version: "3.9"
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: hospital_rotation_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: hospital_rotation_db
      DB_USER: root
      DB_PASSWORD: changeme
      JWT_SECRET: replace_with_a_long_random_string
      JWT_EXPIRES_IN: 8h
      NOTIFY_MODE: mock
      MIN_WEEKS_FOR_COMPLETION: 3
      BLOCK_TOTAL_WEEKS: 4
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api
    ports:
      - "3000:3000"

volumes:
  mysql_data:
